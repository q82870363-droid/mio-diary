<style>
  :root {
    --cream:#faf8f4;--warm-white:#fff;--ink:#1a1a1a;--ink-light:#555;--ink-faint:#999;
    --border:#e8e4de;--border-light:#f0ede8;--accent:#c8856a;--accent-light:#f5ede9;
    --green:#6a9e85;--green-light:#eaf3ee;--blue:#5a7fa8;--blue-light:#eaf0f7;
    --amber:#b8874a;--amber-light:#faf0e3;--pink:#b06080;--pink-light:#f7ecf1;
    --red:#c0392b;--red-light:#fdf0ef;--gold:#c9a84c;--gold-light:#fdf6e3;
    --papa:#5a7fa8;--papa-light:#eaf0f7;--mama:#b06080;--mama-light:#f7ecf1;
    --radius:14px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--cream);color:var(--ink);font-family:'Noto Sans SC','Noto Serif JP',sans-serif;min-height:100vh;font-size:15px;line-height:1.7;}
  .site-header{background:var(--warm-white);border-bottom:1px solid var(--border);padding:20px 24px 16px;text-align:center;position:sticky;top:0;z-index:50;}
  .site-header h1{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:400;letter-spacing:0.08em;color:var(--ink);}
  .site-header p{font-size:12px;color:var(--ink-faint);margin-top:3px;letter-spacing:0.05em;}
  .container{max-width:680px;margin:0 auto;padding:24px 16px 80px;}
  .stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:24px;}
  .stat{background:var(--warm-white);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 10px;text-align:center;}
  .stat-num{font-size:22px;font-weight:500;color:var(--accent);}
  .stat-label{font-size:11px;color:var(--ink-faint);margin-top:3px;line-height:1.4;}
  .toolbar{display:flex;gap:8px;margin-bottom:18px;align-items:center;flex-wrap:wrap;}
  .filter-bar{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
  .filter-btn{font-size:12px;padding:5px 12px;border-radius:99px;border:1px solid var(--border);background:var(--warm-white);cursor:pointer;color:var(--ink-light);white-space:nowrap;transition:all 0.15s;}
  .filter-btn:hover{border-color:var(--accent);color:var(--accent);}
  .filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .export-btn{font-size:12px;padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--warm-white);cursor:pointer;color:var(--ink-light);white-space:nowrap;}
  .export-btn:hover{background:var(--cream);}
  .add-btn{width:100%;padding:14px;border:1.5px dashed var(--border);border-radius:var(--radius);background:transparent;color:var(--ink-faint);font-size:14px;cursor:pointer;margin-bottom:20px;transition:all 0.15s;font-family:inherit;}
  .add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .entry{background:var(--warm-white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;transition:box-shadow 0.15s;}
  .entry:hover{box-shadow:0 2px 12px rgba(0,0,0,0.05);}
  .entry-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .entry-date{font-size:12px;color:var(--ink-faint);letter-spacing:0.04em;margin-right:auto;}
  .entry-tag{font-size:11px;padding:3px 10px;border-radius:99px;letter-spacing:0.03em;}
  .tag-growth{background:var(--green-light);color:var(--green);}
  .tag-life{background:var(--blue-light);color:var(--blue);}
  .tag-feeling{background:var(--pink-light);color:var(--pink);}
  .tag-health{background:var(--amber-light);color:var(--amber);}
  .tag-milestone{background:var(--gold-light);color:var(--gold);}
  .author-badge{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:500;}
  .author-papa{background:var(--papa-light);color:var(--papa);}
  .author-mama{background:var(--mama-light);color:var(--mama);}
  .entry-title{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:12px;line-height:1.5;}
  .lang-tabs{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;width:fit-content;margin-bottom:12px;}
  .lang-tab{font-size:12px;padding:3px 12px;cursor:pointer;background:transparent;border:none;color:var(--ink-faint);font-family:inherit;transition:all 0.1s;}
  .lang-tab.active{background:var(--cream);color:var(--ink);font-weight:500;}
  .entry-body{font-size:14px;color:var(--ink-light);line-height:1.85;white-space:pre-wrap;}
  .entry-body-ja{font-size:13px;color:var(--ink-light);line-height:1.95;white-space:pre-wrap;font-family:'Noto Serif JP',serif;}
  .translating{font-style:italic;color:var(--ink-faint);font-size:13px;}
  .entry-actions{display:flex;gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border-light);align-items:center;flex-wrap:wrap;}
  .act-btn{font-size:12px;padding:4px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--ink-faint);font-family:inherit;transition:all 0.15s;}
  .act-btn:hover{background:var(--cream);color:var(--ink-light);}
  .act-btn.del:hover{background:var(--red-light);color:var(--red);border-color:#e8d0ce;}
  .like-btn{display:flex;align-items:center;gap:4px;font-size:13px;padding:4px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--ink-faint);font-family:inherit;transition:all 0.15s;margin-left:auto;}
  .like-btn:hover{background:#fff0f3;}
  .like-btn.liked{color:#e05c7a;border-color:#f4c0cc;background:#fff0f3;}
  .like-count{font-size:12px;}
  .comments-section{margin-top:14px;padding-top:12px;border-top:1px solid var(--border-light);}
  .comment-item{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start;}
  .comment-author{font-size:11px;font-weight:500;padding:2px 8px;border-radius:99px;white-space:nowrap;margin-top:2px;}
  .comment-body{font-size:13px;color:var(--ink-light);line-height:1.6;flex:1;}
  .comment-time{font-size:11px;color:var(--ink-faint);margin-top:2px;}
  .comment-input-row{display:flex;gap:8px;margin-top:10px;align-items:center;}
  .comment-input{flex:1;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;font-family:inherit;color:var(--ink);background:var(--warm-white);outline:none;}
  .comment-input:focus{border-color:var(--accent);}
  .comment-submit{font-size:12px;padding:7px 14px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .comment-submit:hover{background:#b8705a;}
  .loading-msg{text-align:center;color:var(--ink-faint);padding:40px 0;font-size:14px;}
  .modal-overlay{position:fixed;inset:0;background:rgba(20,15,10,0.4);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px 40px;overflow-y:auto;}
  .modal{background:var(--warm-white);border-radius:var(--radius);border:1px solid var(--border);padding:24px;width:100%;max-width:560px;margin:auto;}
  .modal h2{font-size:17px;font-weight:500;margin-bottom:18px;color:var(--ink);}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  .form-col-label{font-size:11px;color:var(--ink-faint);margin-bottom:5px;}
  .fg{margin-bottom:12px;}
  .fg label{display:block;font-size:12px;color:var(--ink-faint);margin-bottom:5px;}
  .fg input,.fg select{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:14px;font-family:inherit;color:var(--ink);background:var(--warm-white);outline:none;transition:border-color 0.15s;}
  .fg input:focus,.fg select:focus{border-color:var(--accent);}
  .bi-input{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:13px;font-family:inherit;color:var(--ink);background:var(--warm-white);outline:none;transition:border-color 0.15s;}
  .bi-input:focus{border-color:var(--accent);}
  .bi-textarea{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:13px;font-family:inherit;color:var(--ink);background:var(--warm-white);outline:none;min-height:130px;resize:vertical;line-height:1.7;transition:border-color 0.15s;}
  .bi-textarea:focus{border-color:var(--accent);}
  .author-switch{display:flex;gap:8px;margin-bottom:14px;}
  .author-opt{flex:1;padding:10px;border-radius:var(--radius-sm);border:2px solid var(--border);background:transparent;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;transition:all 0.15s;text-align:center;}
  .author-opt.papa-opt{color:var(--papa);}
  .author-opt.papa-opt.selected{background:var(--papa-light);border-color:var(--papa);}
  .author-opt.mama-opt{color:var(--mama);}
  .author-opt.mama-opt.selected{background:var(--mama-light);border-color:var(--mama);}
  .hint-box{background:var(--cream);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;color:var(--ink-faint);margin-bottom:14px;line-height:1.6;}
  .modal-btns{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;}
  .btn{font-size:13px;padding:7px 16px;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;border:1px solid var(--border);background:transparent;color:var(--ink-light);transition:all 0.15s;}
  .btn:hover{background:var(--cream);}
  .btn-accent{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn-accent:hover{background:#b8705a;}
  .btn-green{background:var(--green);color:#fff;border-color:var(--green);}
  .btn-green:hover{background:#5a8e75;}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}
  .sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px;vertical-align:middle;}
  .sync-dot.offline{background:var(--ink-faint);}
  .sync-status{font-size:11px;color:var(--ink-faint);text-align:center;margin-bottom:14px;}
  .confirm-overlay{position:fixed;inset:0;background:rgba(20,15,10,0.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;}
  .confirm-box{background:var(--warm-white);border-radius:var(--radius);border:1px solid var(--border);padding:24px;max-width:340px;width:100%;text-align:center;}
  .confirm-box p{font-size:14px;color:var(--ink-light);margin-bottom:18px;line-height:1.6;}
  .btn-red{background:var(--red);color:#fff;border-color:var(--red);}
  .btn-red:hover{background:#a93226;}
  /* 里程碑庆祝弹窗 */
  .milestone-overlay{position:fixed;inset:0;background:rgba(10,8,5,0.6);z-index:400;display:flex;align-items:center;justify-content:center;padding:16px;}
  .milestone-box{background:var(--warm-white);border-radius:20px;border:2px solid var(--gold);padding:36px 28px;max-width:360px;width:100%;text-align:center;}
  .milestone-emoji{font-size:52px;margin-bottom:12px;}
  .milestone-title{font-size:20px;font-weight:500;color:var(--gold);margin-bottom:8px;font-family:'Noto Serif JP',serif;}
  .milestone-msg{font-size:14px;color:var(--ink-light);line-height:1.7;margin-bottom:20px;}
</style>
</head>

// ── 里程碑检测 ──
function checkMilestones() {
  const days = Math.floor((new Date() - BIRTH) / 86400000);
  const shown = JSON.parse(localStorage.getItem('shownMilestones') || '[]');
  for (const ms of MILESTONES) {
    if (days >= ms.days && !shown.includes(ms.days)) {
      shown.push(ms.days);
      localStorage.setItem('shownMilestones', JSON.stringify(shown));
      setTimeout(() => {
        document.getElementById('ms-emoji').textContent = ms.emoji;
        document.getElementById('ms-title').textContent = ms.title;
        document.getElementById('ms-msg').textContent   = ms.msg;
        document.getElementById('milestone-overlay').style.display = 'flex';
      }, 1200);
      break;
    }
  }
}

// ── Firestore 监听 ──
const q = query(collection(db,'entries'), orderBy('date','desc'));
onSnapshot(q, snap => {
  allEntries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  updateStats(); renderEntries();
  document.getElementById('sync-dot').classList.remove('offline');
  document.getElementById('sync-text').textContent = '已同步 · 同期済み';
}, () => {
  document.getElementById('sync-dot').classList.add('offline');
  document.getElementById('sync-text').textContent = '连接失败 · 接続エラー';
});

checkMilestones();

function updateStats() {
  const days = Math.floor((new Date() - BIRTH) / 86400000);
  document.getElementById('total-count').textContent  = allEntries.length;
  document.getElementById('age-display').textContent  = Math.floor(days/30) + '个月';
  document.getElementById('days-display').textContent = days + '天';
}

function renderEntries() {
  const list = currentFilter === 'all' ? allEntries : allEntries.filter(e => e.tag === currentFilter);
  const el = document.getElementById('entries-list');
  if (!list.length) { el.innerHTML = '<div class="loading-msg">暂无日记 / 日記がありません</div>'; return; }
  el.innerHTML = list.map(e => {
    const lang = activeLangs[e.id] || 'zh';
    const tl = TAG_MAP[e.tag] || ['',''];
    const [y,m,d] = (e.date||'').split('-');
    const dateStr = y ? `${y}年${parseInt(m)}月${parseInt(d)}日` : '';
    const bodyHtml = lang === 'zh'
      ? `<div class="entry-body">${(e.body||'').replace(/</g,'&lt;')}</div>`
      : `<div class="entry-body-ja">${e.bodyJa ? e.bodyJa.replace(/</g,'&lt;') : '<span class="translating">日本語訳なし</span>'}</div>`;
    const titleDisp = lang === 'zh' ? (e.title||'') : (e.titleJa||e.title||'');
    const authorClass = e.author === 'mama' ? 'author-mama' : 'author-papa';
    const authorLabel = e.author === 'mama' ? '👩 Mama' : '👨 Papa';
    const likes = e.likes || 0;
    const isLiked = !!likedEntries[e.id];
    const commentsOpen = openComments[e.id];
    return `
    <div class="entry" id="entry-${e.id}">
      <div class="entry-meta">
        <span class="entry-date">${dateStr}</span>
        <span class="author-badge ${authorClass}">${authorLabel}</span>
        <span class="entry-tag ${TAG_CLASS[e.tag]||''}">${tl[0]}</span>
      </div>
      ${titleDisp ? `<div class="entry-title">${titleDisp.replace(/</g,'&lt;')}</div>` : ''}
      <div class="lang-tabs">
        <button class="lang-tab ${lang==='zh'?'active':''}" onclick="window._setLang('${e.id}','zh')">中文</button>
        <button class="lang-tab ${lang==='ja'?'active':''}" onclick="window._setLang('${e.id}','ja')">日本語</button>
      </div>
      ${bodyHtml}
      <div class="entry-actions">
        <button class="act-btn" onclick="window._editEntry('${e.id}')">✏️ 编辑</button>
        <button class="act-btn del" onclick="window._confirmDelete('${e.id}')">🗑 删除</button>
        <button class="act-btn" onclick="window._toggleComments('${e.id}')">${commentsOpen ? '▲' : '💬'} 评论</button>
        <button class="like-btn ${isLiked?'liked':''}" onclick="window._toggleLike('${e.id}')">
          ${isLiked ? '❤️' : '🤍'} <span class="like-count">${likes}</span>
        </button>
      </div>
      ${commentsOpen ? renderComments(e) : ''}
    </div>`;
  }).join('');
}

function renderComments(e) {
  const comments = e.comments || [];
  const commentsHtml = comments.length ? comments.map(c => `
    <div class="comment-item">
      <span class="author-badge ${c.author==='mama'?'author-mama':'author-papa'}" style="font-size:10px;">${c.author==='mama'?'👩 Mama':'👨 Papa'}</span>
      <div>
        <div class="comment-body">${(c.text||'').replace(/</g,'&lt;')}</div>
        <div class="comment-time">${c.time||''}</div>
      </div>
    </div>`).join('') : '<div style="font-size:13px;color:var(--ink-faint);margin-bottom:8px;">还没有评论 / まだコメントなし</div>';
  return `
  <div class="comments-section">
    ${commentsHtml}
    <div class="comment-input-row">
      <select id="comment-author-${e.id}" style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 8px;font-size:12px;font-family:inherit;outline:none;color:var(--ink);background:var(--warm-white);">
        <option value="papa">👨 Papa</option>
        <option value="mama">👩 Mama</option>
      </select>
      <input class="comment-input" id="comment-input-${e.id}" placeholder="写一条评论… / コメントを書く…" onkeydown="if(event.key==='Enter')window._addComment('${e.id}')" />
      <button class="comment-submit" onclick="window._addComment('${e.id}')">发送</button>
    </div>
  </div>`;
}

// ── 点赞 ──
window._toggleLike = async id => {
  const isLiked = !!likedEntries[id];
  const ref = doc(db,'entries',id);
  await updateDoc(ref, { likes: increment(isLiked ? -1 : 1) });
  if (isLiked) delete likedEntries[id]; else likedEntries[id] = true;
  localStorage.setItem('likedEntries', JSON.stringify(likedEntries));
};

// ── 评论 ──
window._toggleComments = id => {
  openComments[id] = !openComments[id];
  renderEntries();
};

window._addComment = async id => {
  const input = document.getElementById(`comment-input-${id}`);
  const authorSel = document.getElementById(`comment-author-${id}`);
  const text = input.value.trim();
  if (!text) return;
  const entry = allEntries.find(e => e.id === id);
  const comments = [...(entry.comments||[]), {
    author: authorSel.value,
    text,
    time: new Date().toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
  }];
  await updateDoc(doc(db,'entries',id), { comments });
  input.value = '';
};

// ── 语言切换 ──
window._setLang = (id, lang) => { activeLangs[id] = lang; renderEntries(); };

// ── 筛选 ──
window.filterTag = tag => {
  currentFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.tag === tag));
  renderEntries();
};

// ── 作者选择 ──
window.selectAuthor = author => {
  selectedAuthor = author;
  document.getElementById('opt-papa').classList.toggle('selected', author === 'papa');
  document.getElementById('opt-mama').classList.toggle('selected', author === 'mama');
};

// ── Modal ──
function fillModal(e) {
  selectAuthor(e ? (e.author||'papa') : 'papa');
  document.getElementById('new-date').value     = e ? (e.date||'') : new Date().toISOString().split('T')[0];
  document.getElementById('new-tag').value      = e ? (e.tag||'growth') : 'growth';
  document.getElementById('new-title').value    = e ? (e.title||'') : '';
  document.getElementById('new-title-ja').value = e ? (e.titleJa||'') : '';
  document.getElementById('new-body').value     = e ? (e.body||'') : '';
  document.getElementById('new-body-ja').value  = e ? (e.bodyJa||'') : '';
}

window.openModal = () => {
  editingId = null;
  document.getElementById('modal-title').textContent = '写一篇新日记 / 新しい日記を書く';
  document.getElementById('save-btn').textContent = '保存';
  fillModal(null);
  document.getElementById('modal-overlay').style.display = 'flex';
};

window._editEntry = id => {
  const e = allEntries.find(x => x.id === id);
  if (!e) return;
  editingId = id;
  document.getElementById('modal-title').textContent = '编辑日记 / 日記を編集';
  document.getElementById('save-btn').textContent = '保存修改';
  fillModal(e);
  document.getElementById('modal-overlay').style.display = 'flex';
};

window.closeModal = () => { document.getElementById('modal-overlay').style.display = 'none'; editingId = null; };

window._confirmDelete = id => {
  pendingDeleteId = id;
  document.getElementById('confirm-overlay').style.display = 'flex';
  document.getElementById('confirm-del-btn').onclick = async () => {
    if (pendingDeleteId) await deleteDoc(doc(db,'entries',pendingDeleteId));
    closeConfirm();
  };
};
window.closeConfirm = () => { document.getElementById('confirm-overlay').style.display = 'none'; pendingDeleteId = null; };

// ── 翻译 ──
async function googleTranslate(text, from, to) {
  const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`;
  const res = await fetch(url);
  const data = await res.json();
  return data[0].map(s => s[0]).join('');
}

window.doTranslateZhJa = async () => {
  const title = document.getElementById('new-title').value.trim();
  const body  = document.getElementById('new-body').value.trim();
  if (!body) { alert('请先填写左侧中文内容'); return; }
  const btn = document.getElementById('translate-btn-zhja');
  btn.disabled = true; btn.textContent = '翻译中…';
  try {
    const [jt, jb] = await Promise.all([
      title ? googleTranslate(title,'zh-CN','ja') : Promise.resolve(''),
      googleTranslate(body,'zh-CN','ja')
    ]);
    if (jt) document.getElementById('new-title-ja').value = jt;
    document.getElementById('new-body-ja').value = jb;
  } catch { alert('翻译失败，请重试'); }
  btn.disabled = false; btn.textContent = '中→日';
};

window.doTranslateJaZh = async () => {
  const titleJa = document.getElementById('new-title-ja').value.trim();
  const bodyJa  = document.getElementById('new-body-ja').value.trim();
  if (!bodyJa) { alert('请先填写右侧日文内容'); return; }
  const btn = document.getElementById('translate-btn-jazh');
  btn.disabled = true; btn.textContent = '翻译中…';
  try {
    const [zt, zb] = await Promise.all([
      titleJa ? googleTranslate(titleJa,'ja','zh-CN') : Promise.resolve(''),
      googleTranslate(bodyJa,'ja','zh-CN')
    ]);
    if (zt) document.getElementById('new-title').value = zt;
    document.getElementById('new-body').value = zb;
  } catch { alert('翻译失败，请重试'); }
  btn.disabled = false; btn.textContent = '日→中';
};

// ── 保存 ──
window.saveEntry = async () => {
  const date    = document.getElementById('new-date').value;
  const title   = document.getElementById('new-title').value.trim();
  const titleJa = document.getElementById('new-title-ja').value.trim();
  const tag     = document.getElementById('new-tag').value;
  const body    = document.getElementById('new-body').value.trim();
  const bodyJa  = document.getElementById('new-body-ja').value.trim();
  if (!date || (!body && !bodyJa)) { alert('请填写日期和至少一种语言的内容'); return; }
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '保存中…';
  try {
    const data = { date, title, titleJa, tag, body, bodyJa, author: selectedAuthor };
    if (editingId) {
      await updateDoc(doc(db,'entries',editingId), data);
    } else {
      await addDoc(collection(db,'entries'), { ...data, likes:0, comments:[], createdAt: serverTimestamp() });
    }
    closeModal();
  } catch { alert('保存失败，请重试'); }
  btn.disabled = false; btn.textContent = editingId ? '保存修改' : '保存';
};

  let html = `<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>澪音の成長日記</title>
<style>body{font-family:'Noto Serif JP',serif;max-width:700px;margin:40px auto;padding:0 24px;color:#333;line-height:1.85;background:#faf8f4;}

.ja-label{font-size:11px;color:#bbb;margin-bottom:4px;}.body-ja{font-size:13px;white-space:pre-wrap;color:#777;border-top:1px solid #f0ede8;padding-top:10px;}
</style></head><body><h1>澪音の成長日記</h1><p class="sub">パパとママからの贈り物 · 爸爸妈妈写给你的故事</p>`;
  sorted.forEach(e => {

    html += `<div class="entry"><div class="meta"><span class="date">${ds}</span><span class="author ${authorCls}">${authorLabel}</span><span class="tag tag-${e.tag}">${tl[0]}</span></div>

  });
  html += '</body></html>';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([html],{type:'text/html;charset=utf-8'}));
  a.download = '澪音成长日记.html'; a.click();
};
